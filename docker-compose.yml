version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ats_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats_password}
      POSTGRES_DB: ${POSTGRES_DB:-ats_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ats_user} -d ${POSTGRES_DB:-ats_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://ats_user:ats_password@db:5432/ats_db
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_USER=ats_user
      - POSTGRES_PASSWORD=ats_password
      - POSTGRES_DB=ats_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    ports:
      - "8000:8000"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://ats_user:ats_password@db:5432/ats_db
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_USER=ats_user
      - POSTGRES_PASSWORD=ats_password
      - POSTGRES_DB=ats_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    command: ["celery", "-A", "src.core.celery_app", "worker", "--loglevel=info"]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://ats_user:ats_password@db:5432/ats_db
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_USER=ats_user
      - POSTGRES_PASSWORD=ats_password
      - POSTGRES_DB=ats_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    command: ["celery", "-A", "src.core.celery_app", "beat", "--loglevel=info"]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
